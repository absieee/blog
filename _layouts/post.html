---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}{% if page.categories and page.categories.size > 0 %} · {{ page.categories | join: " / " }}{% endif %}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
    <p class="post-summary">{{ page.summary }}</p>
    {% endif %}
  </header>

  <div class="post-body">
    {{ content }}
  </div>
</article>
